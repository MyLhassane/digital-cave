<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>المدخل الرئيسي - البيئة الكريستالية</title>
    <style>
        :root { --bg-dark: #01040a; --panel-glow: #00D4FF; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body, html { width: 100%; height: 100%; overflow: hidden; background-color: var(--bg-dark); font-family: sans-serif; color: #fff; direction: rtl; touch-action: none; }
        canvas { width: 100% !important; height: 100% !important; display: block; position: absolute; top: 0; left: 0; touch-action: none; z-index: 1; }
        #fade-overlay { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: #01040a; z-index: 9990; pointer-events: none; opacity: 0; transition: opacity 0.6s ease-in-out; }
        #orientation-screen { display: none; position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: #0a0a0c; z-index: 9999; color: #ffffff; text-align: center; justify-content: center; align-items: center; flex-direction: column; }
        @media screen and (orientation: portrait) { #orientation-screen { display: flex; } }
</style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/lil-gui@0.18/dist/lil-gui.min.js"></script>
</head>
<body>
    <div id="fade-overlay"></div>
    <div id="orientation-screen">
        <div style="font-size: 48px; margin-bottom: 20px;">🔄</div>
        <p>يرجى تدوير الجهاز للوضع الأفقي</p>
    </div>
    <script>
        const scene = new THREE.Scene();
        scene.fog = new THREE.FogExp2(0x01040a, 0.00085);

        const settings = {
            displacement: {
                amplitude: 40,
                detail: 0.03,
                twist: 6.0,
                offset: 0.01
            },
            fogDensity: 0.00085,
            fogColor: 0x01040a
        };

        function updateFog() {
            scene.fog.density = settings.fogDensity;
            scene.fog.color.set(settings.fogColor);
        }
        updateFog();

        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 1, 10000);
        camera.position.set(0, 0, 150);

        const renderer = new THREE.WebGLRenderer({ antialias: true, powerPreference: "high-performance" });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        document.body.appendChild(renderer.domElement);

        const ambientLight = new THREE.AmbientLight(0xffffff, 0.5);
        scene.add(ambientLight);
        const headlight = new THREE.PointLight(0xffffff, 2.0, 1500);
        scene.add(headlight);

        
        
        function preserveOriginalPositions(geometry) {
            if (!geometry.attributes.origPosition) {
                geometry.setAttribute('origPosition', geometry.attributes.position.clone());
            }
        }

        function applyCrystallineDisplacement(geometry) {
            const posAttr = geometry.attributes.position;
            const origAttr = geometry.attributes.origPosition;
            const colors = [];
            for (let i = 0; i < posAttr.count; i++) {
                let x = origAttr ? origAttr.getX(i) : posAttr.getX(i);
                let y = origAttr ? origAttr.getY(i) : posAttr.getY(i);
                let z = origAttr ? origAttr.getZ(i) : posAttr.getZ(i);
                let angle = Math.atan2(y, x);

                const rockNoise = Math.sin(z * settings.displacement.detail) * settings.displacement.amplitude
                    + Math.cos(angle * settings.displacement.twist + z * settings.displacement.offset) * (settings.displacement.amplitude * 0.625);

                posAttr.setX(i, x + Math.cos(angle) * rockNoise);
                posAttr.setY(i, y + Math.sin(angle) * rockNoise);

                if (Math.abs(Math.sin(z * 0.04)) > 0.88) {
                    colors.push(0.1, 0.3, 0.5);
                } else {
                    colors.push(0.05, 0.08, 0.12);
                }
            }
            posAttr.needsUpdate = true;
            geometry.setAttribute('color', new THREE.Float32BufferAttribute(colors, 3));
            geometry.computeVertexNormals();
        }


        // Main Tunnel
        const mainTunnelGeo = new THREE.CylinderGeometry(400, 400, 3500, 24, 60, true);
        mainTunnelGeo.rotateX(Math.PI / 2);
        mainTunnelGeo.translate(0, 0, -1600);
        preserveOriginalPositions(mainTunnelGeo);
        applyCrystallineDisplacement(mainTunnelGeo);

        const caveMaterial = new THREE.MeshLambertMaterial({
            vertexColors: true, flatShading: true, side: THREE.DoubleSide,
            color: new THREE.Color(0x01131a), emissive: new THREE.Color(0x004466)
        });
        const mainTunnel = new THREE.Mesh(mainTunnelGeo, caveMaterial);
        scene.add(mainTunnel);

        // Branches configuration
        const branchesConfig = [
            { id: "natural", name: "العلوم الطبيعية", zFork: -600, angle: -Math.PI / 4, side: -1, color: '#00d4ff' },
            { id: "social", name: "العلوم الاجتماعية", zFork: -1400, angle: Math.PI / 4, side: 1, color: '#9d00ff' },
            { id: "formal", name: "العلوم الشكلية", zFork: -2200, angle: -Math.PI / 4, side: -1, color: '#00ff87' }
        ];

        const interactiveTargets = [];

        function createGlowingSignboard(text, colorHex) {
            const canvas = document.createElement('canvas');
            canvas.width = 512; canvas.height = 180;
            const ctx = canvas.getContext('2d');
            
            ctx.fillStyle = 'rgba(3, 9, 20, 0.9)'; ctx.fillRect(0, 0, 512, 180);
            ctx.strokeStyle = colorHex; ctx.lineWidth = 8; ctx.strokeRect(4, 4, 504, 172);
            
            const grad = ctx.createLinearGradient(0, 0, 512, 180);
            grad.addColorStop(0, '#011f38'); grad.addColorStop(1, colorHex);
            ctx.fillStyle = grad; ctx.fillRect(20, 20, 472, 140);
            
            ctx.fillStyle = '#ffffff'; ctx.font = 'bold 42px sans-serif'; 
            ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
            ctx.fillText(text, 256, 90);
            
            return new THREE.CanvasTexture(canvas);
        }

        branchesConfig.forEach(cfg => {
            const branchLength = 1200;
            const branchGeo = new THREE.CylinderGeometry(150, 150, branchLength, 16, 20, true);
            branchGeo.rotateX(Math.PI / 2);
            applyCrystallineDisplacement(branchGeo);
            
            const branchMesh = new THREE.Mesh(branchGeo, caveMaterial);
            
            // Positioning branch correctly so it connects to main tunnel wall outwards
            branchMesh.position.set(0, 0, cfg.zFork);
            branchMesh.rotation.y = cfg.angle;
            branchMesh.translateZ(- (branchLength / 2) - 280); 
            scene.add(branchMesh);

            const signTex = createGlowingSignboard(cfg.name, cfg.color);
            const signMat = new THREE.MeshBasicMaterial({ map: signTex, side: THREE.DoubleSide, transparent: true });
            const signMesh = new THREE.Mesh(new THREE.PlaneGeometry(160, 55), signMat);
            
            // Positioning sign at the entrance of the branch
            signMesh.position.set(0, 0, cfg.zFork);
            signMesh.rotation.y = cfg.angle * 0.5; // slight angle towards user
            signMesh.translateZ(-300); // push sign deeper into branch mouth
            signMesh.translateX(cfg.side * -50);
            signMesh.position.y = 80;
            signMesh.userData = { redirectUrl: `sections.html?domain=${cfg.id}` };
            
            scene.add(signMesh);
            interactiveTargets.push(signMesh);
        });

        let targetZ = 150; let currentZ = 150;
        
        let touchStartY = 0;
        window.addEventListener('touchstart', (e) => {
            touchStartY = e.touches[0].clientY;
        }, {passive: false});
        
        window.addEventListener('touchmove', (e) => {
            e.preventDefault(); 
            let touchY = e.touches[0].clientY;
            let deltaY = touchStartY - touchY;
            targetZ -= deltaY * 2.0;
            targetZ = Math.max(-2900, Math.min(150, targetZ));
            touchStartY = touchY;
        }, {passive: false});

        window.addEventListener('wheel', (e) => {
            targetZ -= e.deltaY * 0.75;
            targetZ = Math.max(-2900, Math.min(150, targetZ));
        });

        const raycaster = new THREE.Raycaster(); const mouse = new THREE.Vector2();
        let isTransitioning = false;

        function handleClick(clientX, clientY) {
            if (isTransitioning) return;
            mouse.x = (clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(clientY / window.innerHeight) * 2 + 1;
            raycaster.setFromCamera(mouse, camera);
            const intersects = raycaster.intersectObjects(interactiveTargets);
            if (intersects.length > 0) {
                isTransitioning = true;
                targetZ = intersects[0].object.position.z + 50;
                document.getElementById('fade-overlay').style.opacity = '1';
                setTimeout(() => { window.location.href = intersects[0].object.userData.redirectUrl; }, 600);
            }
        }

        window.addEventListener('click', (e) => handleClick(e.clientX, e.clientY));
        window.addEventListener('touchend', (e) => {
            if(e.changedTouches.length > 0) {
                handleClick(e.changedTouches[0].clientX, e.changedTouches[0].clientY);
            }
        });

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        function animate() {
            requestAnimationFrame(animate);
            currentZ += (targetZ - currentZ) * 0.08;
            camera.position.z = currentZ;
            headlight.position.z = currentZ - 10;
            camera.position.y = 0;
            renderer.render(scene, camera);
        }
        animate();
    </script>
</body>
</html>
