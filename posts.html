<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>المواضيع - البيئة المتغيرة</title>
    <style>
        :root { --bg-dark: #01040a; --panel-glow: #00D4FF; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body, html { width: 100%; height: 100%; overflow: hidden; background-color: var(--bg-dark); font-family: sans-serif; color: #fff; direction: rtl; touch-action: none; }
        canvas { width: 100% !important; height: 100% !important; display: block; position: absolute; top: 0; left: 0; touch-action: none; z-index: 1; }
        #fade-overlay { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: #01040a; z-index: 9990; pointer-events: none; opacity: 0; transition: opacity 0.6s ease-in-out; }
        #orientation-screen { display: none; position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: #0a0a0c; z-index: 9999; color: #ffffff; text-align: center; justify-content: center; align-items: center; flex-direction: column; }
        @media screen and (orientation: portrait) { #orientation-screen { display: flex; } }
</style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>
    <div id="fade-overlay"></div>
    <div id="orientation-screen">
        <div style="font-size: 48px; margin-bottom: 20px;">🔄</div>
        <p>يرجى تدوير الجهاز للوضع الأفقي</p>
    </div>
    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const domainId = urlParams.get('domain') || 'natural';
        
        const scene = new THREE.Scene();
        scene.fog = new THREE.FogExp2(0x01040a, 0.00085);
        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 1, 10000);
        camera.position.set(0, 0, 100);

        const renderer = new THREE.WebGLRenderer({ antialias: true, powerPreference: "high-performance" });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        const ambientLight = new THREE.AmbientLight(0xffffff, 0.5);
        scene.add(ambientLight);
        const headlight = new THREE.PointLight(0xffffff, 2.0, 1500);
        scene.add(headlight);

        
        function applyCrystallineDisplacement(geometry) {
            const posAttr = geometry.attributes.position;
            const colors = [];
            for (let i = 0; i < posAttr.count; i++) {
                let x = posAttr.getX(i);
                let y = posAttr.getY(i);
                let z = posAttr.getZ(i);
                let angle = Math.atan2(y, x);
                
                let rockNoise = Math.sin(z * 0.03) * 40 + Math.cos(angle * 6 + z * 0.01) * 25;
                posAttr.setX(i, x + Math.cos(angle) * rockNoise);
                posAttr.setY(i, y + Math.sin(angle) * rockNoise);

                if (Math.abs(Math.sin(z * 0.04)) > 0.88) {
                    colors.push(0.1, 0.3, 0.5);
                } else {
                    colors.push(0.05, 0.08, 0.12);
                }
            }
            geometry.setAttribute('color', new THREE.Float32BufferAttribute(colors, 3));
            geometry.computeVertexNormals();
        }


        const totalPanels = 10;
        const panelSpacing = 320;
        const caveLength = (totalPanels * panelSpacing) + 2000;

        const caveGeo = new THREE.CylinderGeometry(400, 400, caveLength, 20, 60, true);
        caveGeo.rotateX(Math.PI / 2);
        caveGeo.translate(0, 0, -caveLength / 2 + 200);
        applyCrystallineDisplacement(caveGeo);

        const caveMaterial = new THREE.MeshLambertMaterial({
            vertexColors: true, flatShading: true, side: THREE.BackSide,
            color: new THREE.Color(0x01131a), emissive: new THREE.Color(0x004466)
        });
        const caveMesh = new THREE.Mesh(caveGeo, caveMaterial);
        scene.add(caveMesh);

        const wallBaseColors = [
            new THREE.Color(0x020a14), new THREE.Color(0x120124), 
            new THREE.Color(0x01140a), new THREE.Color(0x1a020b)
        ];
        const wallEmissiveColors = [
            new THREE.Color(0x004477), new THREE.Color(0x440088), 
            new THREE.Color(0x005522), new THREE.Color(0x660022)
        ];

        const panelsGroup = new THREE.Group();
        scene.add(panelsGroup);
        const panelsData = [];

        function createPanelTexture(title, desc) {
            const pCanvas = document.createElement('canvas');
            pCanvas.width = 512; pCanvas.height = 680;
            const pCtx = pCanvas.getContext('2d');

            pCtx.fillStyle = 'rgba(3, 9, 20, 0.98)'; pCtx.fillRect(0, 0, 512, 680);
            pCtx.strokeStyle = '#00d4ff55'; pCtx.lineWidth = 6; pCtx.strokeRect(3, 3, 506, 674);

            const grad = pCtx.createLinearGradient(0, 0, 512, 240);
            grad.addColorStop(0, '#011f38'); grad.addColorStop(1, '#00d4ff');
            pCtx.fillStyle = grad; pCtx.fillRect(25, 25, 462, 240);

            pCtx.fillStyle = '#ffffff'; pCtx.font = 'bold 34px sans-serif';
            pCtx.textAlign = 'right'; pCtx.textBaseline = 'top';
            pCtx.fillText(title, 472, 295);

            pCtx.fillStyle = '#9fa9b8'; pCtx.font = '24px sans-serif';
            const words = desc.split(' '); let line = ''; let yPos = 365;
            for(let n = 0; n < words.length; n++) {
                let testLine = line + words[n] + ' ';
                if (pCtx.measureText(testLine).width > 420 && n > 0) {
                    pCtx.fillText(line, 472, yPos);
                    line = words[n] + ' '; yPos += 40;
                } else { line = testLine; }
            }
            pCtx.fillText(line, 472, yPos);
            return new THREE.CanvasTexture(pCanvas);
        }

        for (let i = 0; i < totalPanels; i++) {
            const isLeft = (i % 2 === 0);
            const texture = createPanelTexture(`المقالة الرائعة ${i + 1}`, "هذا النص هو ملخص محاكي للمقالة يتم توزيعه ديناميكياً داخل اللوحة مع الحفاظ على التوهج والجمالية العالية للبيئة الكريستالية المغلفة.");
            const panelMat = new THREE.MeshLambertMaterial({ map: texture, side: THREE.DoubleSide, transparent: true });
            const panelMesh = new THREE.Mesh(new THREE.PlaneGeometry(160, 210), panelMat);
            
            const xPos = isLeft ? -110 : 110;
            const zPos = -(i * panelSpacing) - 400;
            
            panelMesh.position.set(xPos, 0, zPos);
            panelsGroup.add(panelMesh);
            panelsData.push({ mesh: panelMesh, z: zPos, isLeft: isLeft });
        }

        let targetZ = 100; let currentZ = 100; let isLeaving = false;
        
        let touchStartY = 0;
        window.addEventListener('touchstart', (e) => {
            touchStartY = e.touches[0].clientY;
        }, {passive: false});
        
        window.addEventListener('touchmove', (e) => {
            if (isLeaving) return;
            e.preventDefault();
            let touchY = e.touches[0].clientY;
            let deltaY = touchStartY - touchY;
            targetZ -= deltaY * 2.0;
            
            if (targetZ > 160) {
                isLeaving = true; document.getElementById('fade-overlay').style.opacity = '1';
                setTimeout(() => { window.location.href = `sections.html?domain=${domainId}`; }, 500); return;
            }
            const maxDepth = -(totalPanels * panelSpacing) + 100;
            targetZ = Math.max(maxDepth, Math.min(160, targetZ));
            touchStartY = touchY;
        }, {passive: false});

        window.addEventListener('wheel', (e) => {
            if (isLeaving) return;
            targetZ -= e.deltaY * 0.75;
            if (targetZ > 160) {
                isLeaving = true; document.getElementById('fade-overlay').style.opacity = '1';
                setTimeout(() => { window.location.href = `sections.html?domain=${domainId}`; }, 500); return;
            }
            const maxDepth = -(totalPanels * panelSpacing) + 100;
            targetZ = Math.max(maxDepth, Math.min(160, targetZ));
        });

        function animate() {
            requestAnimationFrame(animate);
            currentZ += (targetZ - currentZ) * 0.08;
            camera.position.z = currentZ;
            headlight.position.z = currentZ - 10;
            camera.position.y = 0;

            // Color Interpolation Magic from corridor.html
            let colorProgress = Math.abs(currentZ) / (panelSpacing * 3);
            let currentFloor = Math.floor(colorProgress) % wallBaseColors.length;
            let currentCeil = (currentFloor + 1) % wallBaseColors.length;
            let blendFactor = colorProgress % 1;

            caveMaterial.color.copy(wallBaseColors[currentFloor]).lerp(wallBaseColors[currentCeil], blendFactor);
            caveMaterial.emissive.copy(wallEmissiveColors[currentFloor]).lerp(wallEmissiveColors[currentCeil], blendFactor);
            scene.fog.color.copy(caveMaterial.color);

            // Panel Rotational Alpha Fading
            panelsData.forEach(panel => {
                let relativeZ = panel.z - currentZ;
                
                if (relativeZ > 130 || relativeZ < -2400) { panel.mesh.visible = false; return; } 
                else { panel.mesh.visible = true; }

                if (relativeZ > -400) {
                    let exitFade = (relativeZ - (-400)) / 500;
                    panel.mesh.material.opacity = 1 - Math.max(0, Math.min(1, exitFade));
                } else if (relativeZ < -1600) {
                    let farFade = 1 - ((-relativeZ - 1600) / 800);
                    panel.mesh.material.opacity = Math.max(0, Math.min(1, farFade));
                } else { panel.mesh.material.opacity = 1; }

                let baseAngle = panel.isLeft ? 0.32 : -0.32;
                let finalAngle = baseAngle;
                if (relativeZ > -450 && relativeZ < -50) {
                    let factor = (relativeZ - (-450)) / 400;
                    finalAngle = baseAngle * (1 - Math.max(0, Math.min(1, factor)));
                } else if (relativeZ >= -50) { finalAngle = 0; }
                panel.mesh.rotation.y = finalAngle;
            });

            renderer.render(scene, camera);
        }
        animate();
    </script>
</body>
</html>
