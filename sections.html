<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>الأقسام الفرعية - البيئة الكريستالية</title>
    <style>
        :root { --bg-dark: #01040a; --panel-glow: #00D4FF; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body, html { width: 100%; height: 100%; overflow: hidden; background-color: var(--bg-dark); font-family: sans-serif; color: #fff; direction: rtl; touch-action: none; }
        canvas { width: 100% !important; height: 100% !important; display: block; position: absolute; top: 0; left: 0; touch-action: none; z-index: 1; }
        #fade-overlay { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: #01040a; z-index: 9990; pointer-events: none; opacity: 0; transition: opacity 0.6s ease-in-out; }
        #orientation-screen { display: none; position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: #0a0a0c; z-index: 9999; color: #ffffff; text-align: center; justify-content: center; align-items: center; flex-direction: column; }
        @media screen and (orientation: portrait) { #orientation-screen { display: flex; } }
</style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>
    <div id="fade-overlay"></div>
    <div id="orientation-screen">
        <div style="font-size: 48px; margin-bottom: 20px;">🔄</div>
        <p>يرجى تدوير الجهاز للوضع الأفقي</p>
    </div>
    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const domainId = urlParams.get('domain') || 'natural';
        const subSectionsDatabase = {
            natural: ["الفيزياء الكونية", "الكيمياء العضوية", "العلوم الحياتية", "جيولوجيا الأرض"],
            social: ["علم النفس السلوكي", "علم الاجتماع البنيوي", "الاقتصاد السياسي"],
            formal: ["الرياضيات البحتة", "المنطق الرياضي", "هندسة البرمجيات"]
        };
        const currentSections = subSectionsDatabase[domainId] || [];

        const scene = new THREE.Scene();
        scene.fog = new THREE.FogExp2(0x01040a, 0.00085);
        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 1, 10000);
        camera.position.set(0, 0, 100);

        const renderer = new THREE.WebGLRenderer({ antialias: true, powerPreference: "high-performance" });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        const ambientLight = new THREE.AmbientLight(0xffffff, 0.5);
        scene.add(ambientLight);
        const headlight = new THREE.PointLight(0xffffff, 2.0, 1500);
        scene.add(headlight);

        
        function applyCrystallineDisplacement(geometry) {
            const posAttr = geometry.attributes.position;
            const colors = [];
            for (let i = 0; i < posAttr.count; i++) {
                let x = posAttr.getX(i);
                let y = posAttr.getY(i);
                let z = posAttr.getZ(i);
                let angle = Math.atan2(y, x);
                
                let rockNoise = Math.sin(z * 0.03) * 40 + Math.cos(angle * 6 + z * 0.01) * 25;
                posAttr.setX(i, x + Math.cos(angle) * rockNoise);
                posAttr.setY(i, y + Math.sin(angle) * rockNoise);

                if (Math.abs(Math.sin(z * 0.04)) > 0.88) {
                    colors.push(0.1, 0.3, 0.5);
                } else {
                    colors.push(0.05, 0.08, 0.12);
                }
            }
            geometry.setAttribute('color', new THREE.Float32BufferAttribute(colors, 3));
            geometry.computeVertexNormals();
        }


        const totalLength = Math.max(2000, currentSections.length * 600);
        const corridorGeo = new THREE.CylinderGeometry(300, 300, totalLength, 24, 40, true);
        corridorGeo.rotateX(Math.PI / 2);
        corridorGeo.translate(0, 0, -totalLength / 2 + 100);
        applyCrystallineDisplacement(corridorGeo);

        const caveMaterial = new THREE.MeshLambertMaterial({
            vertexColors: true, flatShading: true, side: THREE.BackSide,
            color: new THREE.Color(0x120124), emissive: new THREE.Color(0x440088)
        });
        const corridorMesh = new THREE.Mesh(corridorGeo, caveMaterial);
        scene.add(corridorMesh);

        const interactivePortals = [];
        function createPortalTexture(title) {
            const canvas = document.createElement('canvas');
            canvas.width = 400; canvas.height = 120;
            const ctx = canvas.getContext('2d');
            ctx.fillStyle = 'rgba(3, 9, 20, 0.9)'; ctx.fillRect(0, 0, 400, 120);
            ctx.strokeStyle = '#9d00ff'; ctx.lineWidth = 6; ctx.strokeRect(3, 3, 394, 114);
            const grad = ctx.createLinearGradient(0, 0, 400, 120);
            grad.addColorStop(0, '#1a0236'); grad.addColorStop(1, '#9d00ff');
            ctx.fillStyle = grad; ctx.fillRect(15, 15, 370, 90);
            ctx.fillStyle = '#ffffff'; ctx.font = 'bold 30px sans-serif'; 
            ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
            ctx.fillText(title, 200, 60);
            return new THREE.CanvasTexture(canvas);
        }

        currentSections.forEach((secName, index) => {
            const zPos = -400 - (index * 550);
            const isLeft = index % 2 === 0;
            const xPos = isLeft ? -100 : 100;
            
            const portalTex = createPortalTexture(secName);
            const portalMat = new THREE.MeshBasicMaterial({ map: portalTex, transparent: true, side: THREE.DoubleSide });
            const portalPlane = new THREE.Mesh(new THREE.PlaneGeometry(120, 36), portalMat);
            
            portalPlane.position.set(xPos, 20, zPos);
            portalPlane.rotation.y = isLeft ? Math.PI / 4 : -Math.PI / 4;
            portalPlane.userData = { redirectUrl: `posts.html?domain=${domainId}&section=${encodeURIComponent(secName)}` };
            
            scene.add(portalPlane);
            interactivePortals.push(portalPlane);
        });

        let targetZ = 100; let currentZ = 100; let isLeaving = false;
        
        let touchStartY = 0;
        window.addEventListener('touchstart', (e) => {
            touchStartY = e.touches[0].clientY;
        }, {passive: false});
        
        window.addEventListener('touchmove', (e) => {
            if (isLeaving) return;
            e.preventDefault();
            let touchY = e.touches[0].clientY;
            let deltaY = touchStartY - touchY;
            targetZ -= deltaY * 2.0;
            
            if (targetZ > 160) {
                isLeaving = true; document.getElementById('fade-overlay').style.opacity = '1';
                setTimeout(() => { window.location.href = 'index.html'; }, 500); return;
            }
            const maxDepth = -(currentSections.length * 550) - 200;
            targetZ = Math.max(maxDepth, Math.min(160, targetZ));
            touchStartY = touchY;
        }, {passive: false});

        window.addEventListener('wheel', (e) => {
            if (isLeaving) return;
            targetZ -= e.deltaY * 0.75;
            if (targetZ > 160) {
                isLeaving = true; document.getElementById('fade-overlay').style.opacity = '1';
                setTimeout(() => { window.location.href = 'index.html'; }, 500); return;
            }
            const maxDepth = -(currentSections.length * 550) - 200;
            targetZ = Math.max(maxDepth, Math.min(160, targetZ));
        });

        const raycaster = new THREE.Raycaster(); const mouse = new THREE.Vector2();
        
        function handleClick(clientX, clientY) {
            if (isLeaving) return;
            mouse.x = (clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(clientY / window.innerHeight) * 2 + 1;
            raycaster.setFromCamera(mouse, camera);
            const intersects = raycaster.intersectObjects(interactivePortals);
            if (intersects.length > 0) {
                isLeaving = true; document.getElementById('fade-overlay').style.opacity = '1';
                setTimeout(() => { window.location.href = intersects[0].object.userData.redirectUrl; }, 600);
            }
        }
        
        window.addEventListener('click', (e) => handleClick(e.clientX, e.clientY));
        window.addEventListener('touchend', (e) => {
            if(e.changedTouches.length > 0) {
                handleClick(e.changedTouches[0].clientX, e.changedTouches[0].clientY);
            }
        });

        function animate() {
            requestAnimationFrame(animate);
            currentZ += (targetZ - currentZ) * 0.08;
            camera.position.z = currentZ;
            headlight.position.z = currentZ - 10;
            camera.position.y = 0;
            renderer.render(scene, camera);
        }
        animate();
    </script>
</body>
</html>
